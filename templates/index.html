<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoSphere</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;500;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --cyan: #00ffff;
            --cyan-lo: rgba(0, 255, 255, 0.15);
            --cyan-border: rgba(0, 255, 255, 0.35);
            --cyan-glow: 0 0 22px rgba(0, 255, 255, 0.45);
            --green: #00ff88;
            --green-glow: 0 0 10px rgba(0, 255, 100, 0.9);
            --glass-bg: linear-gradient(135deg, rgba(0, 80, 200, 0.10), rgba(0, 255, 255, 0.05));
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.55), 0 0 40px rgba(0, 255, 255, 0.10);
            --font-hud: 'Orbitron', sans-serif;
            --font-mono: 'Share Tech Mono', monospace;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: var(--font-hud);
        }

        /* ════════════════════════════════
       ROOT
    ════════════════════════════════ */
        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* ── SPACE PHOTO BACKGROUND ── */
        #bg-photo {
            position: absolute;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1770370419338-f9a813302baa?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixlib=rb-4.1.0&q=80&w=1920');
            background-size: cover;
            background-position: center;
        }

        #bg-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom,
                    rgba(0, 0, 0, 0.62) 0%,
                    rgba(5, 15, 50, 0.42) 50%,
                    rgba(0, 25, 40, 0.45) 100%);
        }

        /* ── NEON GRID ── */
        #neon-grid {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            opacity: 0.22;
        }

        .g-line-h {
            position: absolute;
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(0, 255, 255, 0.35), transparent);
        }

        .g-line-v {
            position: absolute;
            height: 100%;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 255, 0.35), transparent);
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, transparent, rgba(0, 255, 255, 0.55), transparent);
            filter: blur(2px);
            animation: scanAnim 8s linear infinite;
        }

        @keyframes scanAnim {
            0% {
                top: -2%;
            }

            100% {
                top: 102%;
            }
        }

        /* ── LIGHT BEAMS ── */
        .beam {
            position: absolute;
            top: 0;
            width: 3px;
            height: 100%;
            filter: blur(10px);
            pointer-events: none;
        }

        .beam-1 {
            left: 25%;
            background: linear-gradient(to bottom, rgba(0, 255, 255, 0.32), rgba(0, 255, 255, 0.06), transparent);
        }

        .beam-2 {
            right: 33%;
            background: linear-gradient(to bottom, rgba(0, 100, 255, 0.32), rgba(0, 100, 255, 0.06), transparent);
        }

        .beam-3 {
            right: 25%;
            background: linear-gradient(to bottom, rgba(0, 220, 100, 0.40), rgba(0, 220, 100, 0.06), transparent);
            filter: blur(7px);
        }

        /* ════════════════════════════════
       HOLOGRAPHIC MAP
    ════════════════════════════════ */
        #holo-map {
            position: absolute;
            top: 80px;
            left: 40px;
            width: 380px;
            height: 380px;
            pointer-events: none;
            filter: drop-shadow(0 0 22px rgba(0, 255, 255, 0.55));
            animation: mapReveal 1.5s ease both;
        }

        @keyframes mapReveal {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Globe outer pulse */
        .globe-outline {
            animation: globePulse 3s ease-in-out infinite;
        }

        @keyframes globePulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.45;
            }
        }

        /* Rotating orbital path */
        .orbit-path {
            transform-origin: 200px 200px;
            animation: orbitSpin 20s linear infinite;
        }

        @keyframes orbitSpin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Satellite blink */
        .sat-marker {
            animation: satBlink 2s ease-in-out infinite;
        }

        .sat-marker:nth-child(1) {
            animation-delay: 0s;
        }

        .sat-marker:nth-child(2) {
            animation-delay: 0.5s;
        }

        .sat-marker:nth-child(3) {
            animation-delay: 1.0s;
        }

        .sat-marker:nth-child(4) {
            animation-delay: 1.5s;
        }

        @keyframes satBlink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.25;
            }
        }

        /* ════════════════════════════════
       GLASS UTILITY
    ════════════════════════════════ */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--cyan-border);
            border-radius: 18px;
            box-shadow: var(--glass-shadow);
        }

        /* ════════════════════════════════
       CENTER UI STACK
    ════════════════════════════════ */
        #center-ui {
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 32px;
            gap: 28px;
        }

        /* HEADER */
        #header-panel {
            padding: 16px 40px;
            animation: slideDown 0.9s ease 0.1s both;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #header-panel h1 {
            font-size: clamp(18px, 2.4vw, 28px);
            font-weight: 300;
            letter-spacing: 0.28em;
            color: rgba(210, 248, 255, 0.96);
            text-shadow: 0 0 22px rgba(0, 255, 255, 0.7), 0 0 55px rgba(0, 255, 255, 0.3);
        }

        /* CONTROLS ROW */
        #controls-row {
            display: flex;
            align-items: center;
            gap: 28px;
            animation: riseUp 0.9s ease 0.3s both;
        }

        @keyframes riseUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* UPLOAD MODULE */
        #upload-wrap {
            position: relative;
        }

        #upload-zone {
            width: 360px;
            height: 260px;
            background: linear-gradient(135deg, rgba(0, 20, 80, 0.22), rgba(0, 60, 80, 0.18));
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border: 2px dashed rgba(0, 200, 255, 0.45);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow:
                0 0 60px rgba(0, 255, 255, 0.18),
                inset 0 0 40px rgba(0, 255, 255, 0.05);
        }

        #upload-zone:hover,
        #upload-zone.dragging {
            border-color: rgba(0, 255, 255, 0.85);
            box-shadow:
                0 0 80px rgba(0, 255, 255, 0.38),
                inset 0 0 60px rgba(0, 255, 255, 0.11);
        }

        #upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        #upload-icon {
            animation: floatIcon 2s ease-in-out infinite;
        }

        @keyframes floatIcon {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        #upload-icon svg {
            width: 64px;
            height: 64px;
            color: rgba(0, 220, 255, 0.85);
            filter: drop-shadow(0 0 12px rgba(0, 255, 255, 0.65));
        }

        #upload-text {
            margin-top: 20px;
            font-size: 17px;
            font-weight: 300;
            color: rgba(0, 215, 255, 0.85);
            letter-spacing: 0.06em;
        }

        #upload-hint {
            margin-top: 6px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: rgba(0, 200, 255, 0.42);
            letter-spacing: 0.08em;
        }

        #upload-zone img#preview-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 22px;
            display: none;
        }

        /* corner glows */
        .corner-glow {
            position: absolute;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            filter: blur(22px);
            pointer-events: none;
        }

        .corner-tl {
            top: -8px;
            left: -8px;
            background: rgba(0, 255, 255, 0.2);
        }

        .corner-br {
            bottom: -8px;
            right: -8px;
            background: rgba(0, 255, 100, 0.2);
        }

        /* DROPDOWN */
        #dropdown-wrap {
            position: relative;
            animation: slideFromRight 0.8s ease 0.5s both;
        }

        @keyframes slideFromRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        #dropdown-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            min-width: 240px;
            background: linear-gradient(to right, rgba(0, 255, 255, 0.14), rgba(0, 80, 200, 0.14));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 255, 0.4);
            border-radius: 16px;
            color: rgba(0, 230, 255, 0.9);
            font-family: var(--font-hud);
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.28s ease;
            box-shadow: 0 0 28px rgba(0, 255, 255, 0.18);
        }

        #dropdown-btn:hover {
            border-color: rgba(0, 255, 255, 0.72);
            box-shadow: 0 0 52px rgba(0, 255, 255, 0.38);
        }

        #dropdown-btn .d-label {
            flex: 1;
            text-align: left;
        }

        #dropdown-btn .d-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
        }

        .chevron-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .chevron-icon.open {
            transform: rotate(180deg);
        }

        #dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: linear-gradient(135deg, rgba(0, 10, 50, 0.95), rgba(0, 40, 55, 0.95));
            backdrop-filter: blur(26px);
            -webkit-backdrop-filter: blur(26px);
            border: 1px solid rgba(0, 255, 255, 0.38);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 42px rgba(0, 255, 255, 0.28);
            z-index: 200;
            transform-origin: top;
            animation: menuOpen 0.2s ease both;
            display: none;
        }

        #dropdown-menu.open {
            display: block;
            animation: menuOpen 0.2s ease both;
        }

        @keyframes menuOpen {
            from {
                opacity: 0;
                transform: scaleY(0.9) translateY(-6px);
            }

            to {
                opacity: 1;
                transform: scaleY(1) translateY(0);
            }
        }

        .d-item {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 14px 22px;
            background: none;
            border: none;
            border-bottom: 1px solid rgba(0, 255, 255, 0.14);
            color: rgba(0, 230, 255, 0.85);
            font-family: var(--font-hud);
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .d-item:last-child {
            border-bottom: none;
        }

        .d-item:hover {
            background: rgba(0, 255, 255, 0.12);
        }

        .d-item svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* INSTRUCTION PANEL */
        #instruction-panel {
            padding: 12px 26px;
            animation: riseUp 0.9s ease 0.6s both;
        }

        #instruction-panel p {
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.14em;
            color: rgba(0, 220, 255, 0.72);
        }

        /* ════════════════════════════════
       FLOATING DATA PANELS
    ════════════════════════════════ */
        .data-panel {
            position: absolute;
            min-width: 220px;
            padding: 22px 22px;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.08), rgba(0, 80, 200, 0.05));
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border: 1px solid rgba(0, 255, 255, 0.28);
            border-radius: 18px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.12);
            transition: box-shadow 0.3s ease;
            z-index: 15;
        }

        .data-panel:hover {
            box-shadow: 0 0 65px rgba(0, 255, 255, 0.28);
        }

        /* positions */

        @keyframes panelIn {
            from {
                opacity: 0;
                transform: scale(0.82);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .dp-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .dp-title {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.2em;
            color: rgba(0, 200, 255, 0.55);
            text-transform: uppercase;
        }

        .dp-icon-wrap {
            padding: 8px;
            background: rgba(0, 255, 255, 0.09);
            border-radius: 10px;
        }

        .dp-icon-wrap svg {
            width: 18px;
            height: 18px;
            color: rgba(0, 220, 255, 0.85);
            filter: drop-shadow(0 0 7px rgba(0, 255, 255, 0.8));
        }

        .dp-value {
            font-size: clamp(28px, 3vw, 38px);
            font-weight: 300;
            color: rgba(210, 248, 255, 0.96);
            text-shadow: 0 0 12px rgba(0, 255, 255, 0.5);
            letter-spacing: 0.04em;
            margin-bottom: 6px;
        }

        .dp-subtitle {
            font-family: var(--font-mono);
            font-size: 11px;
            color: rgba(0, 220, 100, 0.65);
            letter-spacing: 0.08em;
        }

        .dp-status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: var(--green-glow);
            animation: dotPulse 2s ease-in-out infinite;
        }

        @keyframes dotPulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.35);
                opacity: 0.5;
            }
        }

        .status-label {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.18em;
            color: rgba(0, 220, 100, 0.55);
            text-transform: uppercase;
        }

        /* ════════════════════════════════
       ANALYZE BUTTON
    ════════════════════════════════ */
        #analyze-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 36px;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.18), rgba(0, 80, 200, 0.22));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 255, 0.55);
            border-radius: 14px;
            color: rgba(0, 230, 255, 0.95);
            font-family: var(--font-hud);
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 32px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(0, 255, 255, 0.05);
            animation: riseUp 0.9s ease 0.8s both;
            position: relative;
            overflow: hidden;
        }

        #analyze-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(0, 255, 255, 0.18), transparent);
            transform: skewX(-20deg);
            transition: left 0s;
        }

        #analyze-btn:hover {
            border-color: rgba(0, 255, 255, 0.85);
            box-shadow: 0 0 55px rgba(0, 255, 255, 0.38), inset 0 0 30px rgba(0, 255, 255, 0.1);
        }

        #analyze-btn:hover::before {
            left: 160%;
            transition: left 0.55s ease;
        }

        #analyze-btn:active {
            transform: scale(0.97);
        }

        #analyze-btn svg {
            width: 18px;
            height: 18px;
        }

        #analyze-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        #analyze-btn .btn-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        #analyze-btn.loading .btn-spinner {
            display: block;
        }

        #analyze-btn.loading .btn-scan-icon {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ════════════════════════════════
       RESULTS PANEL
    ════════════════════════════════ */
        #results-panel {
            width: min(820px, 92vw);
            padding: 0;
            animation: riseUp 0.55s ease both;
            display: none;
        }

        #results-panel.visible {
            display: block;
        }

        /* Tab bar */
        #tab-bar {
            display: flex;
            border-bottom: 1px solid rgba(0, 255, 255, 0.22);
            padding: 0 24px;
        }

        .tab-btn {
            position: relative;
            padding: 14px 22px;
            background: none;
            border: none;
            font-family: var(--font-hud);
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.18em;
            color: rgba(0, 200, 255, 0.45);
            cursor: pointer;
            transition: color 0.25s ease;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--cyan);
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.8);
            transform: scaleX(0);
            transition: transform 0.25s ease;
        }

        .tab-btn.active {
            color: rgba(0, 230, 255, 0.95);
        }

        .tab-btn.active::after {
            transform: scaleX(1);
        }

        .tab-btn:hover {
            color: rgba(0, 220, 255, 0.75);
        }

        /* Tab panes */
        .tab-pane {
            display: none;
            padding: 24px;
        }

        .tab-pane.active {
            display: block;
            animation: fadePane 0.3s ease both;
        }

        @keyframes fadePane {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* ── TAB 1: CONFIDENCE + OVERVIEW ── */
        #tab-overview {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 24px;
            align-items: center;
        }

        /* Radial confidence gauge */
        #conf-gauge-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #gauge-svg {
            width: 160px;
            height: 160px;
        }

        #gauge-track {
            fill: none;
            stroke: rgba(0, 255, 255, 0.12);
            stroke-width: 10;
        }

        #gauge-fill {
            fill: none;
            stroke: url(#gaugeGrad);
            stroke-width: 10;
            stroke-linecap: round;
            stroke-dasharray: 408;
            /* 2π × r(65) ≈ 408 */
            stroke-dashoffset: 408;
            transition: stroke-dashoffset 1.4s cubic-bezier(0.22, 1, 0.36, 1);
            filter: drop-shadow(0 0 6px rgba(0, 255, 255, 0.7));
        }

        #gauge-center-val {
            font-size: 28px;
            font-weight: 300;
            fill: rgba(210, 248, 255, 0.96);
            text-shadow: none;
            font-family: 'Orbitron', sans-serif;
        }

        #gauge-center-pct {
            font-size: 11px;
            fill: rgba(0, 200, 255, 0.55);
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 0.12em;
        }

        .gauge-label {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.22em;
            color: rgba(0, 200, 255, 0.5);
            text-transform: uppercase;
        }

        .conf-tier {
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-shadow: 0 0 10px currentColor;
        }

        /* Overview metrics */
        #overview-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .metric-card {
            padding: 14px 16px;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.18);
            border-radius: 12px;
            transition: border-color 0.25s;
        }

        .metric-card:hover {
            border-color: rgba(0, 255, 255, 0.42);
        }

        .metric-card .mc-label {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.22em;
            color: rgba(0, 200, 255, 0.45);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .metric-card .mc-val {
            font-size: 20px;
            font-weight: 300;
            color: rgba(210, 248, 255, 0.95);
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
            letter-spacing: 0.04em;
        }

        .metric-card .mc-sub {
            font-family: var(--font-mono);
            font-size: 10px;
            color: rgba(0, 220, 100, 0.6);
            margin-top: 3px;
            letter-spacing: 0.06em;
        }

        /* ── TAB 2: CLASSIFICATION RESULTS ── */
        #results-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .result-row {
            display: grid;
            grid-template-columns: 28px 1fr 60px;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            background: rgba(0, 255, 255, 0.04);
            border: 1px solid rgba(0, 255, 255, 0.15);
            border-radius: 12px;
            animation: fadePane 0.4s ease both;
            transition: border-color 0.25s, background 0.25s;
        }

        .result-row:hover {
            border-color: rgba(0, 255, 255, 0.38);
            background: rgba(0, 255, 255, 0.07);
        }

        .result-rank {
            font-family: var(--font-mono);
            font-size: 11px;
            color: rgba(0, 200, 255, 0.45);
            text-align: center;
        }

        .result-body {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .result-name {
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.14em;
            color: rgba(210, 248, 255, 0.92);
        }

        .bar-track {
            height: 5px;
            background: rgba(0, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 3px;
            width: 0;
            transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .result-pct {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--cyan);
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.6);
            text-align: right;
            letter-spacing: 0.04em;
        }

        .result-row:nth-child(1) .bar-fill {
            background: linear-gradient(to right, #00ffaa, #00ffff);
            box-shadow: 0 0 8px rgba(0, 255, 200, 0.5);
        }

        .result-row:nth-child(2) .bar-fill {
            background: linear-gradient(to right, #00aaff, #00ffff);
            box-shadow: 0 0 8px rgba(0, 180, 255, 0.5);
        }

        .result-row:nth-child(3) .bar-fill {
            background: linear-gradient(to right, #ffcc00, #ffaa00);
            box-shadow: 0 0 8px rgba(255, 180, 0, 0.5);
        }

        .result-row:nth-child(4) .bar-fill {
            background: linear-gradient(to right, #aa55ff, #ff55cc);
            box-shadow: 0 0 8px rgba(180, 80, 255, 0.4);
        }

        .result-row:nth-child(5) .bar-fill {
            background: linear-gradient(to right, #8899aa, #667788);
            box-shadow: 0 0 5px rgba(130, 150, 180, 0.4);
        }

        /* ── TAB 3: RAW DATA ── */
        #raw-data-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .raw-block {
            padding: 14px 16px;
            background: rgba(0, 0, 20, 0.45);
            border: 1px solid rgba(0, 255, 255, 0.15);
            border-radius: 12px;
        }

        .raw-block-title {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.22em;
            color: rgba(0, 200, 255, 0.45);
            text-transform: uppercase;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.1);
        }

        .raw-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid rgba(0, 255, 255, 0.06);
        }

        .raw-row:last-child {
            border-bottom: none;
        }

        .raw-key {
            font-family: var(--font-mono);
            font-size: 10px;
            color: rgba(0, 200, 255, 0.45);
            letter-spacing: 0.08em;
        }

        .raw-val {
            font-family: var(--font-mono);
            font-size: 10px;
            color: rgba(210, 248, 255, 0.82);
            letter-spacing: 0.06em;
        }

        .raw-val.ok {
            color: rgba(0, 255, 130, 0.8);
        }

        .raw-val.warn {
            color: rgba(255, 200, 0, 0.8);
        }

        #clear-btn {
            padding: 14px 28px;
            border-radius: 14px;
            border: 1px solid rgba(255, 80, 80, 0.5);
            background: rgba(255, 0, 0, 0.08);
            color: rgba(255, 120, 120, 0.9);
            font-family: var(--font-hud);
            cursor: pointer;
            transition: 0.3s;
        }

        #clear-btn:hover {
            background: rgba(255, 0, 0, 0.18);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.25);
        }
    </style>
</head>

<body>
    <div id="app">

        <!-- Space background -->
        <div id="bg-photo"></div>
        <div id="bg-overlay"></div>

        <!-- Neon grid -->
        <div id="neon-grid">
            <div id="grid-h"></div>
            <div id="grid-v"></div>
            <div class="scan-line"></div>
        </div>

        <!-- Light beams -->
        <div class="beam beam-1"></div>
        <div class="beam beam-2"></div>
        <div class="beam beam-3"></div>

        <!-- ═══ HOLOGRAPHIC MAP ═══ -->
        <svg id="holo-map" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="mapGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="rgba(0,255,255,0.8)" />
                    <stop offset="100%" stop-color="rgba(0,100,255,0.4)" />
                </linearGradient>
                <filter id="glowF">
                    <feGaussianBlur stdDeviation="3" result="cb" />
                    <feMerge>
                        <feMergeNode in="cb" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>

            <!-- Globe outline -->
            <circle class="globe-outline" cx="200" cy="200" r="150" fill="none" stroke="url(#mapGrad)" stroke-width="2"
                filter="url(#glowF)" />

            <!-- Latitude lines -->
            <ellipse cx="200" cy="200" rx="150" ry="75" fill="none" stroke="rgba(0,255,255,0.28)" stroke-width="1" />
            <ellipse cx="200" cy="200" rx="150" ry="130" fill="none" stroke="rgba(0,255,255,0.28)" stroke-width="1" />
            <ellipse cx="200" cy="200" rx="150" ry="150" fill="none" stroke="rgba(0,255,255,0.18)" stroke-width="1" />
            <ellipse cx="200" cy="200" rx="150" ry="130" fill="none" stroke="rgba(0,255,255,0.22)" stroke-width="1" />
            <ellipse cx="200" cy="200" rx="150" ry="75" fill="none" stroke="rgba(0,255,255,0.22)" stroke-width="1" />

            <!-- Longitude lines -->
            <ellipse cx="200" cy="200" rx="150" ry="150" fill="none" stroke="rgba(0,255,255,0.25)" stroke-width="1" />
            <ellipse cx="200" cy="200" rx="130" ry="150" fill="none" stroke="rgba(0,255,255,0.25)" stroke-width="1" />
            <ellipse cx="200" cy="200" rx="75" ry="150" fill="none" stroke="rgba(0,255,255,0.25)" stroke-width="1" />
            <ellipse cx="200" cy="200" rx="26" ry="150" fill="none" stroke="rgba(0,255,255,0.20)" stroke-width="1" />
            <ellipse cx="200" cy="200" rx="106" ry="150" fill="none" stroke="rgba(0,255,255,0.22)" stroke-width="1" />
            <ellipse cx="200" cy="200" rx="143" ry="150" fill="none" stroke="rgba(0,255,255,0.18)" stroke-width="1" />

            <!-- Orbital path (spins) -->
            <ellipse class="orbit-path" cx="200" cy="200" rx="180" ry="100" fill="none" stroke="rgba(0,255,100,0.55)"
                stroke-width="1.5" stroke-dasharray="5,5" filter="url(#glowF)" />

            <!-- Satellite markers -->
            <g class="sat-marker">
                <circle cx="380" cy="200" r="4.5" fill="rgba(0,255,100,0.92)" filter="url(#glowF)" />
                <circle cx="380" cy="200" r="9" fill="none" stroke="rgba(0,255,100,0.5)" stroke-width="1.2" />
            </g>
            <g class="sat-marker">
                <circle cx="200" cy="300" r="4.5" fill="rgba(0,255,100,0.92)" filter="url(#glowF)" />
                <circle cx="200" cy="300" r="9" fill="none" stroke="rgba(0,255,100,0.5)" stroke-width="1.2" />
            </g>
            <g class="sat-marker">
                <circle cx="20" cy="200" r="4.5" fill="rgba(0,255,100,0.92)" filter="url(#glowF)" />
                <circle cx="20" cy="200" r="9" fill="none" stroke="rgba(0,255,100,0.5)" stroke-width="1.2" />
            </g>
            <g class="sat-marker">
                <circle cx="200" cy="100" r="4.5" fill="rgba(0,255,100,0.92)" filter="url(#glowF)" />
                <circle cx="200" cy="100" r="9" fill="none" stroke="rgba(0,255,100,0.5)" stroke-width="1.2" />
            </g>
        </svg>

        <!-- ═══ FLOATING DATA PANELS ═══ -->


        <!-- ═══ CENTER UI ═══ -->
        <div id="center-ui">

            <!-- Header -->
            <div class="glass" id="header-panel">
                <h1>GEOSPHERE: GLOBAL GEOGRAPHIC CLASSIFIER</h1>
            </div>

            <!-- Controls row: Upload + Dropdown -->
            <div id="controls-row">

                <!-- Image Upload -->
                <div id="upload-wrap">
                    <div id="upload-zone">
                        <div id="upload-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <polyline points="16 16 12 12 8 16" />
                                <line x1="12" y1="12" x2="12" y2="21" />
                                <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
                            </svg>
                        </div>
                        <p id="upload-text">Drag &amp; Drop Image</p>
                        <p id="upload-hint">or click to browse</p>
                        <img id="preview-img" alt="Preview" />
                        <input type="file" accept="image/*" id="file-input" />
                    </div>
                    <div class="corner-glow corner-tl"></div>
                    <div class="corner-glow corner-br"></div>
                </div>

                <!-- Satellite Dropdown -->
                <div id="dropdown-wrap">
                    <button id="dropdown-btn" onclick="toggleDropdown()">
                        <!-- satellite icon -->
                        <svg class="d-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                            <path d="M7 12l5-5 5 5-5 5z" />
                            <circle cx="12" cy="12" r="2" />
                            <path d="M3 3l4.5 4.5M17 3l3 3M3 21l4.5-4.5M20.5 17.5L17 21" />
                        </svg>
                        <span class="d-label" id="d-label">Choose Model</span>
                        <svg class="chevron-icon" id="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="6 9 12 15 18 9" />
                        </svg>
                    </button>

                    <div id="dropdown-menu">
                        <button class="d-item" onclick="pickOption('baseline', 'Baseline Model')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <path d="M7 12l5-5 5 5-5 5z" />
                                <circle cx="12" cy="12" r="2" />
                                <path d="M3 3l4.5 4.5M17 3l3 3M3 21l4.5-4.5M20.5 17.5L17 21" />
                            </svg>
                            Baseline Model
                        </button>
                        <button class="d-item" onclick="pickOption('improved', 'Improved CNN Model')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <circle cx="12" cy="12" r="10" />
                                <line x1="2" y1="12" x2="22" y2="12" />
                                <path
                                    d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                            </svg>
                            Improved CNN Model
                        </button>
                        <button class="d-item" onclick="pickOption('resnet', 'ResNet (Pretrained) Model')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <path d="M18.36 6.64a9 9 0 1 1-12.73 0" />
                                <line x1="12" y1="2" x2="12" y2="12" />
                            </svg>
                            ResNet (Pretrained) Model
                        </button>
                    </div>
                </div><!-- /dropdown -->

            </div><!-- /controls-row -->

            <!-- Instruction / Analyze row -->
            <div style="display:flex; align-items:center; gap:20px; animation: riseUp 0.9s ease 0.6s both; margin-top: 34px;">
                <div class="glass" id="instruction-panel" style="animation:none;">
                    <p id="instruction-text">Select a satellite feed and upload mission imagery for analysis</p>
                </div>
                <button id="analyze-btn" onclick="runAnalysis()">
                    <div class="btn-spinner"></div>
                    <svg class="btn-scan-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        <line x1="11" y1="8" x2="11" y2="14" />
                        <line x1="8" y1="11" x2="14" y2="11" />
                    </svg>
                    <span id="btn-text">ANALYZE</span>
                </button>
                <button id="clear-btn" onclick="clearAnalysis()">
                    CLEAR
                </button>
            </div>

            <!-- RESULTS PANEL -->
            <div class="glass" id="results-panel">
                <div id="tab-bar">
                    <button class="tab-btn active">CONFIDENCE</button>
                </div>

                <!-- OVERVIEW TAB -->
                <div class="tab-pane active" id="pane-overview">
                    <div id="tab-overview">
                        <div id="conf-gauge-wrap">
                            <svg id="gauge-svg" viewBox="0 0 160 160">
                                <defs>
                                    <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" stop-color="#00ffaa" />
                                        <stop offset="100%" stop-color="#00ffff" />
                                    </linearGradient>
                                </defs>
                                <circle id="gauge-track" cx="80" cy="80" r="65" stroke-dasharray="408"
                                    stroke-dashoffset="0" transform="rotate(-90 80 80)" />
                                <circle id="gauge-fill" cx="80" cy="80" r="65" transform="rotate(-90 80 80)" />
                                <text id="gauge-center-val" x="80" y="76" text-anchor="middle"
                                    dominant-baseline="middle">—</text>
                                <text id="gauge-center-pct" x="80" y="97" text-anchor="middle">CONFIDENCE</text>
                            </svg>
                            <span class="gauge-label">ANALYSIS SCORE</span>
                            <span class="conf-tier" id="conf-tier" style="color:rgba(0,200,255,0.5);">AWAITING
                                SCAN</span>
                        </div>
                        <div id="overview-metrics">
                            <div class="metric-card">
                                <div class="mc-label">Primary Class</div>
                                <div class="mc-val" id="ov-primary">—</div>
                                <div class="mc-sub" id="ov-primary-conf">—</div>
                            </div>
                            <div class="metric-card">
                                <div class="mc-label">Model Used</div>
                                <div class="mc-val" id="ov-model" style="font-size:14px;line-height:1.4;">—</div>
                                <div class="mc-sub" id="ov-model-acc">—</div>
                            </div>
                            <div class="metric-card">
                                <div class="mc-label">Scan Duration</div>
                                <div class="mc-val" id="ov-duration">—</div>
                                <div class="mc-sub">milliseconds</div>
                            </div>
                            <div class="metric-card">
                                <div class="mc-label">Classes Detected</div>
                                <div class="mc-val" id="ov-classes">—</div>
                                <div class="mc-sub">above threshold</div>
                            </div>
                        </div>
                    </div>
                </div>

            </div><!-- /results-panel -->

        </div><!-- /center-ui -->

    </div><!-- /app -->

    <script>
        let selectedModel = "baseline";
        let currentFile = null;
        let isOpen = false;

        /* ---------------- MODEL SELECTION ---------------- */
        function pickOption(model, label) {
            selectedModel = model;

            const labelEl = document.getElementById('d-label');
            if (labelEl) labelEl.textContent = label;

            toggleDropdown();
        }

        /* ---------------- GRID GENERATION ---------------- */
        const gh = document.getElementById('grid-h');
        const gv = document.getElementById('grid-v');

        for (let i = 1; i <= 19; i++) {
            const h = document.createElement('div');
            h.className = 'g-line-h';
            h.style.top = `${i * 5}%`;
            gh.appendChild(h);

            const v = document.createElement('div');
            v.className = 'g-line-v';
            v.style.left = `${i * 5}%`;
            gv.appendChild(v);
        }

        /* ---------------- FILE UPLOAD ---------------- */
        const zone = document.getElementById('upload-zone');
        const fileInput = document.getElementById('file-input');
        const previewImg = document.getElementById('preview-img');
        const analyzeBtn = document.getElementById('analyze-btn');

        zone.addEventListener('dragover', e => {
            e.preventDefault();
            zone.classList.add('dragging');
        });

        zone.addEventListener('dragleave', () => {
            zone.classList.remove('dragging');
        });

        zone.addEventListener('drop', e => {
            e.preventDefault();
            zone.classList.remove('dragging');

            const f = e.dataTransfer.files[0];
            if (f && f.type.startsWith('image/')) {
                loadImage(f);
            } else {
                alert("Only image files are allowed.");
            }
        });

        fileInput.addEventListener('change', e => {
            const f = e.target.files[0];
            if (f) loadImage(f);
        });

        function loadImage(file) {
            currentFile = file;

            const reader = new FileReader();
            reader.onload = ev => {
                previewImg.src = ev.target.result;
                previewImg.style.display = 'block';

                document.getElementById('upload-icon').style.display = 'none';
                document.getElementById('upload-text').style.display = 'none';
                document.getElementById('upload-hint').style.display = 'none';
            };

            reader.readAsDataURL(file);

            if (analyzeBtn) analyzeBtn.disabled = false;
        }

        /* ---------------- DROPDOWN ---------------- */
        function toggleDropdown() {
            isOpen = !isOpen;

            document.getElementById('dropdown-menu').classList.toggle('open', isOpen);
            document.getElementById('chevron').classList.toggle('open', isOpen);
        }

        document.addEventListener('click', e => {
            if (isOpen && !e.target.closest('#dropdown-wrap')) {
                isOpen = false;
                document.getElementById('dropdown-menu').classList.remove('open');
                document.getElementById('chevron').classList.remove('open');
            }
        });

        /* ---------------- ANALYSIS ---------------- */
        const API_URL = "/predict"; // change to http://localhost:8000/predict if needed

        async function runAnalysis() {
            if (!currentFile) {
                alert("Please upload an image first.");
                return;
            }

            const btn = document.getElementById('analyze-btn');
            const btnText = document.getElementById('btn-text');

            btn.classList.add('loading');
            btn.disabled = true;
            btnText.textContent = "SCANNING…";

            const formData = new FormData();
            formData.append("image", currentFile);
            formData.append("model_name", selectedModel);

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || "Server error");
                }

                if (!data.top_prediction || !data.predictions) {
                    throw new Error("Invalid response format");
                }

                populateResults(data);

            } catch (err) {
                console.error("Prediction error:", err);
                alert("Prediction failed: " + err.message);
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
                btnText.textContent = "ANALYZE";
            }
        }

        /* ---------------- RESULTS ---------------- */
        function populateResults(data) {
            document.getElementById('results-panel').classList.add('visible');

            const top = data.top_prediction;

            setGauge(top.confidence);

            document.getElementById('ov-primary').textContent = top.label;
            document.getElementById('ov-primary-conf').textContent =
                `${top.confidence}% confidence`;

            document.getElementById('ov-model').textContent = data.model || "Unknown";
            document.getElementById('ov-duration').textContent = data.duration || 0;
            document.getElementById('ov-classes').textContent =
                data.predictions.length || 0;

            renderPredictions(data.predictions || []);
        }

        /* ---------------- PREDICTION LIST ---------------- */
        function renderPredictions(predictions) {
            const container = document.getElementById("results-list");
            if (!container) return;

            container.innerHTML = "";

            predictions.forEach((p, i) => {
                const row = document.createElement("div");
                row.className = "result-row";

                row.innerHTML = `
            <div class="result-rank">${i + 1}</div>
            <div class="result-body">
                <div class="result-name">${p.label}</div>
                <div class="bar-track">
                    <div class="bar-fill" style="width:${p.confidence}%"></div>
                </div>
            </div>
            <div class="result-pct">${p.confidence}%</div>
        `;

                container.appendChild(row);

                // trigger animation
                setTimeout(() => {
                    const bar = row.querySelector(".bar-fill");
                    if (bar) bar.style.width = `${p.confidence}%`;
                }, 50);
            });
        }

        /* ---------------- GAUGE ---------------- */
        const CIRCUMFERENCE = 2 * Math.PI * 65;

        function setGauge(pct) {
            const fill = document.getElementById('gauge-fill');
            const val = document.getElementById('gauge-center-val');

            if (!fill || !val) return;

            const offset = CIRCUMFERENCE * (1 - pct / 100);

            fill.style.transition = "stroke-dashoffset 1.2s ease";
            fill.style.strokeDashoffset = offset;

            val.textContent = pct.toFixed(1) + "%";
        }

        /* ---------------- CLEAR ---------------- */
        function clearAnalysis() {
            currentFile = null;
            fileInput.value = "";

            previewImg.src = "";
            previewImg.style.display = "none";

            document.getElementById('upload-icon').style.display = 'block';
            document.getElementById('upload-text').style.display = 'block';
            document.getElementById('upload-hint').style.display = 'block';

            document.getElementById('results-panel').classList.remove('visible');

            setGauge(0);

            document.getElementById('ov-primary').textContent = "—";
            document.getElementById('ov-primary-conf').textContent = "—";
            document.getElementById('ov-model').textContent = "—";
            document.getElementById('ov-duration').textContent = "—";
            document.getElementById('ov-classes').textContent = "—";

            if (analyzeBtn) {
                analyzeBtn.disabled = true;
            }
        }
    </script>
</body>

</html>
